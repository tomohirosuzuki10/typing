<!DOCTYPE html>
<!-- HTML文書であることをブラウザに伝える宣言。必ず1行目に書く -->
<html lang="ja">
<!-- lang="ja" → このページが日本語であることを検索エンジンや読み上げソフトに伝える -->

<head>
  <!-- headの中身は画面には表示されない。ページの設定を書く場所 -->

  <!-- 文字コードの指定。UTF-8にしないと日本語が文字化けする -->
  <meta charset="UTF-8">

  <!-- スマホ表示の設定。width=device-width でスマホ幅に合わせる -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- ブラウザのタブに表示されるタイトル -->
  <title>Dev Typing</title>

  <!-- CSSファイルを読み込む。rel="stylesheet" は必須 -->
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <!-- bodyの中に書いたものが画面に表示される -->

  <!-- ===== ヘッダー：ページ上部の共通エリア ===== -->
  <header>
    <!-- h1 = 一番大きな見出し。ページに1つだけ使うのが基本 -->
    <h1>Dev Typing</h1>

    <!-- select = ドロップダウン選択。id="genre-select" でJSから操作する -->
    <select id="genre-select">
      <!-- option の value がJSに渡される値。表示テキストとは別 -->
      <option value="git">Git</option>
      <option value="linux">Linux</option>
      <option value="java">Java</option>
      <option value="sql">SQL</option>
      <option value="command">コマンド全般</option>
      <option value="programming">JS / プログラミング</option>
    </select>
  </header>

  <!-- ===== スタート画面 ===== -->
  <!-- class="screen active" → CSSで .screen は非表示、.active がついた画面だけ表示される -->
  <!-- id="screen-start" → JSがこの要素を取得してactive切り替えに使う -->
  <div id="screen-start" class="screen active">

    <!-- p = 段落テキスト。<br> で改行 -->
    <p class="description">エンジニア向けタイピングゲーム。<br>プログラミング / コマンド用語で腕試し。</p>

    <!-- button を押すと JS の startGame() が呼ばれる（script.jsで設定） -->
    <button id="btn-start" class="btn-primary">スタート</button>
  </div>

  <!-- ===== プレイ中画面 ===== -->
  <!-- activeクラスがないので最初は非表示。JSがゲーム開始時にactiveを付ける -->
  <div id="screen-play" class="screen">

    <!-- ステータスバー：タイマー・正答数・ミス数を横並びで表示 -->
    <div class="status-bar">
      <!-- span = インライン要素。JSがtextContentで文字を書き換える -->
      <span id="timer">⏱ 60秒</span>
      <span id="correct-count">✓ 0問</span>
      <span id="miss-count">❌ 0</span>
    </div>

    <!-- 問題表示エリア -->
    <div class="word-area">
      <!-- 問題の説明文（「gitのブランチを切り替える」など）。JSが更新する -->
      <div id="word-desc" class="word-desc"></div>

      <!-- 問題の単語本体。JSがtextContentで単語を入れる -->
      <div id="word-display" class="word-target"></div>

      <!-- 入力中の進捗（打った文字=緑、次の文字=青カーソル、残り=グレー）。JSがinnerHTMLで更新 -->
      <div id="word-progress" class="word-progress"></div>
    </div>

    <!-- テキスト入力欄。autocomplete等をoffにしてブラウザの補完・修正機能を無効化 -->
    <input id="type-input" type="text"
      autocomplete="off"
      autocorrect="off"
      autocapitalize="off"
      spellcheck="false"
      placeholder="ここに入力…">

    <!-- 終了ボタン。押すと abortGame() が呼ばれてスタート画面に戻る -->
    <button id="btn-end" class="btn-primary">終了</button>
  </div>

  <!-- ===== リザルト画面 ===== -->
  <div id="screen-result" class="screen">
    <h2>リザルト</h2>

    <!-- 2列グリッドでスコアカードを並べる -->
    <div class="result-grid">
      <!-- 各カード：label（ラベル）とvalue（数値）をspanで分けてCSSでスタイルを当てる -->
      <div class="result-item">
        <span class="label">正答数</span>
        <span id="res-correct" class="value">-</span>
      </div>
      <div class="result-item">
        <span class="label">ミス</span>
        <span id="res-miss" class="value">-</span>
      </div>
      <div class="result-item">
        <span class="label">WPM</span>
        <span id="res-wpm" class="value">-</span>
      </div>
      <div class="result-item">
        <span class="label">正確率</span>
        <span id="res-accuracy" class="value">-</span>
      </div>
    </div>

    <!-- もう一度ボタン。押すと startGame() が呼ばれてスコアリセット＆再スタート -->
    <button id="btn-retry" class="btn-primary">もう一度</button>
  </div>

  <!-- ===== JSファイルの読み込み ===== -->
  <!-- words.js を先に読み込む → script.js から wordList を使えるようにするため -->
  <!-- bodyの末尾に書くのが基本。headに書くとHTMLより先にJSが動いてしまう -->
  <script src="words.js"></script>
  <script src="script.js"></script>
</body>
</html>
